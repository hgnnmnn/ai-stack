# Real llama.cpp Backends (issues #2/#3) - GPU-passthrough services for the
# Strix Halo iGPU (Vulkan/RADV, see ADR 0003). Host-specific (devices,
# group_add GIDs, model paths), so kept out of docker-compose.yml: that file
# stays portable and is what docker-compose.test.yml overlays with stub
# Backends for ./tests/run.sh.
#
# Combine with docker-compose.yml for production:
#
#   docker compose -f docker-compose.yml -f docker-compose.backends.yml up -d
#
# Or set COMPOSE_FILE=docker-compose.yml:docker-compose.backends.yml in .env
# so plain `docker compose up -d` picks up both files (see .env.example).

services:
    llama-qwen35:
        # Pinned to b9570: builds b9592+ (incl. the floating "server-vulkan" tag
        # as of 2026-06) ship a broken libggml-vulkan.so (undefined symbol
        # matmul_id_subgroup_q6_k_f32_dot2_aligned_f16acc_data), which silently
        # falls back to CPU-only ("no usable GPU found"). b9570 is the latest
        # build that correctly detects the Vulkan/RADV device.
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9570
        restart: unless-stopped
        ports:
            - "127.0.0.1:8001:8001"
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "${RENDER_GID}"
            - "${VIDEO_GID}"
        volumes:
            - ${MODELS_DIR}:/models:ro,z
        command:
            - -m
            - /models/${QWEN35_MODEL_FILE}
            - --mmproj
            - /models/${QWEN35_MMPROJ_FILE}
            - --port
            - "8001"
            - --ctx-size
            - "131072"
            # 2 slots -> ~65536 ctx/slot, for concurrent users (issue: parallel
            # request handling). Verified --spec-type draft-mtp works with
            # --parallel > 1 on this llama.cpp build. 262144 (131072/slot) was
            # tried and caused severe slowdowns under concurrent load (one
            # slot dropped to ~6 t/s, swap usage doubled) - do not raise
            # without addressing memory headroom first.
            - --parallel
            - "2"
            - --flash-attn
            - "on"
            - --n-gpu-layers
            - "999"
            - --jinja
            - --spec-type
            - draft-mtp
            - --spec-draft-n-max
            - "2"
            # Thinking-mode sampling defaults recommended for Qwen3.6-35B-A3B
            # general tasks.
            - --temp
            - "1.0"
            - --top-p
            - "0.95"
            - --top-k
            - "20"
            - --min-p
            - "0.0"
            - --presence-penalty
            - "1.5"
            - --repeat-penalty
            - "1.0"
            # f16 KV cache (llama-server default) - see ADR 0002.
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 300s

    llama-coder:
        # Pinned to b9570: builds b9592+ (incl. the floating "server-vulkan" tag
        # as of 2026-06) ship a broken libggml-vulkan.so (undefined symbol
        # matmul_id_subgroup_q6_k_f32_dot2_aligned_f16acc_data), which silently
        # falls back to CPU-only ("no usable GPU found"). b9570 is the latest
        # build that correctly detects the Vulkan/RADV device.
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9570
        restart: unless-stopped
        ports:
            - "127.0.0.1:8002:8002"
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "${RENDER_GID}"
            - "${VIDEO_GID}"
        volumes:
            - ${MODELS_DIR}:/models:ro,z
        command:
            - -m
            - /models/${CODER_MODEL_FILE}
            - --port
            - "8002"
            - --ctx-size
            - "262144"
            - --flash-attn
            - "on"
            - --n-gpu-layers
            - "999"
            - --cache-type-k
            - q8_0
            - --cache-type-v
            - q8_0
            - --jinja
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 300s

    litellm:
        depends_on:
            llama-qwen35:
                condition: service_healthy
            llama-coder:
                condition: service_healthy
            postgres:
                condition: service_healthy
