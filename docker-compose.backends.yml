# Real llama.cpp Backends (issues #2/#3) - GPU-passthrough services for the
# Strix Halo iGPU (Vulkan/RADV, see ADR 0003). Host-specific (devices,
# group_add GIDs, model paths), so kept out of docker-compose.yml: that file
# stays portable and is what docker-compose.test.yml overlays with stub
# Backends for ./tests/run.sh.
#
# Combine with docker-compose.yml for production:
#
#   docker compose -f docker-compose.yml -f docker-compose.backends.yml up -d
#
# Or set COMPOSE_FILE=docker-compose.yml:docker-compose.backends.yml in .env
# so plain `docker compose up -d` picks up both files (see .env.example).

services:
    llama-chat:
        # Pinned to b9570: builds b9592+ (incl. the floating "server-vulkan" tag
        # as of 2026-06) ship a broken libggml-vulkan.so (undefined symbol
        # matmul_id_subgroup_q6_k_f32_dot2_aligned_f16acc_data), which silently
        # falls back to CPU-only ("no usable GPU found"). b9570 is the latest
        # build that correctly detects the Vulkan/RADV device.
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9570
        restart: unless-stopped
        # --mlock needs an unbounded memlock ulimit; the container default
        # (~64 KB) is far too small to pin a multi-GB model and llama.cpp would
        # fail with "failed to mlock ... Cannot allocate memory".
        ulimits:
            memlock: -1
        ports:
            - "127.0.0.1:8001:8001"
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "${RENDER_GID}"
            - "${VIDEO_GID}"
        volumes:
            - ${MODELS_DIR}:/models:ro,z
        command:
            - -m
            - /models/${QWEN35_MODEL_FILE}
            # Qwen3.6 vision projector — Ornith-1.0-35B has no multimodal
            # support; uncomment when switching back to Qwen3.6-35B-A3B.
            # - --mmproj
            # - /models/${QWEN35_MMPROJ_FILE}
            - --port
            - "8001"
            - --ctx-size
            - "262144"
            # --ctx-size is the TOTAL KV cache; with --parallel 2 each slot
            # gets 131072. Concurrent requests queue FIFO rather than running
            # interleaved — fine at this scale (single user / few friends).
            - --parallel
            - "2"
            - --flash-attn
            - "on"
            - --n-gpu-layers
            - "999"
            # Pin weights + KV in RAM so the kernel evicts page cache / other
            # processes under memory pressure instead of swapping the model out
            # (directly targets the swap-thrash seen under load on this
            # unified-memory iGPU). Both Backends use it.
            - --mlock
            - --no-mmap
            - --jinja
            # Ornith emits <think>…</think>; split it into the response's
            # reasoning_content field (auto = use the chat template's format)
            # so Clients like OpenWebUI render a collapsible thinking block
            # instead of inline tags.
            - --reasoning-format
            - auto
            # MTP — Ornith has no MTP heads; only relevant for Qwen3.6-35B-A3B.
            # - --spec-type
            # - draft-mtp
            # - --spec-draft-n-max
            # - "2"
            # Ornith-1.0-35B recommended: temp=0.6, top-p=0.95, top-k=20.
            # Previous Qwen3.6 thinking-mode defaults commented below.
            - --temp
            - "0.6"
            - --top-p
            - "0.95"
            - --top-k
            - "20"
            - --min-p
            - "0.0"
            - --repeat-penalty
            - "1.0"
            # q8_0 KV cache — safe for Ornith (no multimodal, see ADR 0002).
            # Saves ~50% KV VRAM vs f16 default.
            # - --cache-type-k
            # - q8_0
            # - --cache-type-v
            # - q8_0
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 300s

    llama-coder:
        # Pinned to b9570: builds b9592+ (incl. the floating "server-vulkan" tag
        # as of 2026-06) ship a broken libggml-vulkan.so (undefined symbol
        # matmul_id_subgroup_q6_k_f32_dot2_aligned_f16acc_data), which silently
        # falls back to CPU-only ("no usable GPU found"). b9570 is the latest
        # build that correctly detects the Vulkan/RADV device.
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9570
        restart: unless-stopped
        # --mlock needs an unbounded memlock ulimit (see llama-chat).
        ulimits:
            memlock: -1
        ports:
            - "127.0.0.1:8002:8002"
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "${RENDER_GID}"
            - "${VIDEO_GID}"
        volumes:
            - ${MODELS_DIR}:/models:ro,z
        command:
            - -m
            - /models/${CODER_MODEL_FILE}
            # Qwen3.6 vision projector — uncomment if vision input is wanted
            # for this container too (mmproj-F32.gguf sits alongside the
            # model file). Left disabled for now to keep the coder slot
            # text-only and consistent with prior AgentWorld config.
            - --mmproj
            - /models/${CODER_MMPROJ_FILE}
            - --port
            - "8002"
            # MTP requires a single slot — parallel slots aren't supported
            # alongside --spec-type draft-mtp yet. Dropped from 2 to 1;
            # the full 262144 ctx-size now belongs to that one slot again
            # (same as the pre-AgentWorld single-slot setup). Trade-off:
            # lost 2-client concurrency, gained MTP self-speculative decode.
            - --ctx-size
            - "262144"
            - --parallel
            - "1"
            - --flash-attn
            - "on"
            - --n-gpu-layers
            - "999"
            # Pin weights + KV in RAM, same rationale as llama-chat.
            - --mlock
            - --no-mmap
            # - --cache-type-k
            # - q8_0
            # - --cache-type-v
            # - q8_0
            - --jinja
            # Qwen3.6 emits <think>…</think>; split into reasoning_content
            # (same rationale as llama-chat / previous AgentWorld config).
            - --reasoning-format
            - auto
            # MTP self-speculative decoding — the MTP head tensors are
            # bundled in this GGUF (unsloth combined _MTP package), so no
            # separate -md/--model-draft path is needed. Start at 3; lower
            # to 2 if draft acceptance is poor on your actual coding prompts
            # (see llama-benchy comparison before committing to a value).
            - --spec-type
            - draft-mtp
            - --spec-draft-n-max
            - "3"
            # Qwen3.6 coding-mode recommended (unchanged from AgentWorld
            # config — same values apply): temp=0.6, top-p=0.95, top-k=20,
            # min-p=0.
            - --temp
            - "0.6"
            - --top-p
            - "0.8"
            - --top-k
            - "20"
            - --min-p
            - "0.0"
            - --presence-penalty
            - "0.0"
            - --repeat-penalty
            - "1.0"
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 300s

    llama-fim:
        # Gleicher Vulkan-Pin wie llama-chat/llama-coder (siehe deren Kommentare
        # zu b9570 / broken libggml-vulkan.so in b9592+).
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9570
        restart: unless-stopped
        ulimits:
            memlock: -1
        ports:
            - "127.0.0.1:8004:8004"
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "${RENDER_GID}"
            - "${VIDEO_GID}"
        volumes:
            - ${MODELS_DIR}:/models:ro,z
        command:
            - -m
            - /models/${FIM_MODEL_FILE} # z.B. qwen2.5-coder-1.5b-base-q8_0.gguf
            - --port
            - "8004"
            # Kein --jinja/Chat-Template — Zed spricht die reine
            # /v1/completions-Route mit fertig formatiertem FIM-Prompt an.
            - --ctx-size
            - "8192"
            - --n-gpu-layers
            - "999"
            - --flash-attn
            - "on"
            # Kleines Modell, KV-Cache muss hier nicht quantisiert werden.
            - --mlock
            - --no-mmap
            # Reines Completion-only-Setup, kein Parallel-Slot-Bedarf.
            - --parallel
            - "1"
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:8004/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 60s

    litellm:
        depends_on:
            llama-chat:
                condition: service_healthy
            llama-coder:
                condition: service_healthy
            postgres:
                condition: service_healthy
