# Real llama.cpp Backends (issues #2/#3) - GPU-passthrough services for the
# Strix Halo iGPU (Vulkan/RADV, see ADR 0003). Host-specific (devices,
# group_add GIDs, model paths), so kept out of docker-compose.yml: that file
# stays portable and is what docker-compose.test.yml overlays with stub
# Backends for ./tests/run.sh.
#
# Combine with docker-compose.yml for production:
#
#   docker compose -f docker-compose.yml -f docker-compose.backends.yml up -d
#
# Or set COMPOSE_FILE=docker-compose.yml:docker-compose.backends.yml in .env
# so plain `docker compose up -d` picks up both files (see .env.example).

services:
    llama-qwen35:
        # Pinned to b9570: builds b9592+ (incl. the floating "server-vulkan" tag
        # as of 2026-06) ship a broken libggml-vulkan.so (undefined symbol
        # matmul_id_subgroup_q6_k_f32_dot2_aligned_f16acc_data), which silently
        # falls back to CPU-only ("no usable GPU found"). b9570 is the latest
        # build that correctly detects the Vulkan/RADV device.
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9570
        restart: unless-stopped
        # --mlock needs an unbounded memlock ulimit; the container default
        # (~64 KB) is far too small to pin a multi-GB model and llama.cpp would
        # fail with "failed to mlock ... Cannot allocate memory".
        ulimits:
            memlock: -1
        ports:
            - "127.0.0.1:8001:8001"
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "${RENDER_GID}"
            - "${VIDEO_GID}"
        volumes:
            - ${MODELS_DIR}:/models:ro,z
        command:
            - -m
            - /models/${QWEN35_MODEL_FILE}
            - --mmproj
            - /models/${QWEN35_MMPROJ_FILE}
            - --port
            - "8001"
            - --ctx-size
            - "131072"
            # 1 slot -> full 131072 ctx/request and maximum MTP speedup (the
            # spec-decode draft has the GPU to itself). Concurrent requests
            # queue FIFO rather than running interleaved - fine at this scale
            # (single user / few friends). --ctx-size is the TOTAL KV cache, so
            # this costs the same VRAM as the old --parallel 2 (2x65536). Note
            # 262144 here (f16 KV) was tried and caused severe slowdowns / swap
            # under load - do not raise ctx-size without addressing headroom.
            - --parallel
            - "1"
            - --flash-attn
            - "on"
            - --n-gpu-layers
            - "999"
            # Pin weights + KV in RAM so the kernel evicts page cache / other
            # processes under memory pressure instead of swapping the model out
            # (directly targets the swap-thrash seen under load on this
            # unified-memory iGPU). Both Backends use it.
            - --mlock
            - --jinja
            - --spec-type
            - draft-mtp
            - --spec-draft-n-max
            - "2"
            # Thinking-mode sampling defaults recommended for Qwen3.6-35B-A3B
            # general tasks.
            - --temp
            - "1.0"
            - --top-p
            - "0.95"
            - --top-k
            - "20"
            - --min-p
            - "0.0"
            - --presence-penalty
            - "1.5"
            - --repeat-penalty
            - "1.0"
            # f16 KV cache (llama-server default) - see ADR 0002.
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 300s

    llama-coder:
        # Pinned to b9570: builds b9592+ (incl. the floating "server-vulkan" tag
        # as of 2026-06) ship a broken libggml-vulkan.so (undefined symbol
        # matmul_id_subgroup_q6_k_f32_dot2_aligned_f16acc_data), which silently
        # falls back to CPU-only ("no usable GPU found"). b9570 is the latest
        # build that correctly detects the Vulkan/RADV device.
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9570
        restart: unless-stopped
        # --mlock needs an unbounded memlock ulimit (see llama-qwen35).
        ulimits:
            memlock: -1
        ports:
            - "127.0.0.1:8002:8002"
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "${RENDER_GID}"
            - "${VIDEO_GID}"
        volumes:
            - ${MODELS_DIR}:/models:ro,z
        command:
            - -m
            - /models/${CODER_MODEL_FILE}
            - --port
            - "8002"
            # 2 slots -> ~131072 ctx/slot for concurrent coding clients. ctx-size
            # is the TOTAL KV cache, so keeping 262144 split across 2 slots uses
            # the SAME q8 KV memory as the old single 262144 slot - no extra
            # VRAM, just two 128k windows instead of one 256k window. KV stays
            # q8-quantized (ADR 0002). To go back to a single 256k-context slot,
            # drop --parallel.
            - --ctx-size
            - "262144"
            - --parallel
            - "2"
            - --flash-attn
            - "on"
            - --n-gpu-layers
            - "999"
            # Pin weights + KV in RAM, same rationale as llama-qwen35.
            - --mlock
            - --cache-type-k
            - q8_0
            - --cache-type-v
            - q8_0
            - --jinja
            - --temp
            - "1.0"
            - --top-p
            - "0.95"
            - --top-k
            - "40"
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 300s

    litellm:
        depends_on:
            llama-qwen35:
                condition: service_healthy
            llama-coder:
                condition: service_healthy
            postgres:
                condition: service_healthy
