model_list:
    - model_name: llama-chat
      litellm_params:
          model: openai/llama-chat
          api_base: http://llama-chat:8001/v1
          api_key: "not-needed"
          input_cost_per_token: 0.00000002
          output_cost_per_token: 0.00000002
    - model_name: llama-coder
      litellm_params:
          model: openai/llama-coder
          api_base: http://llama-coder:8002/v1
          api_key: "not-needed"
          input_cost_per_token: 0.00000002
          output_cost_per_token: 0.00000002
    - model_name: llama-fim
      litellm_params:
          model: text-completion-openai/llama-fim
          api_base: http://llama-fim:8004/v1
          api_key: "not-needed"
          input_cost_per_token: 0.00000002
          output_cost_per_token: 0.00000002
litellm_settings:
    callbacks: ["prometheus"]
    require_auth_for_metrics_endpoint: false
    drop_params: true
    cache: True
    cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        password: os.environ/REDIS_PASSWORD
        ttl: 3600
        # Zed's Edit Prediction hämmert /v1/completions bei praktisch jedem
        # Tastendruck mit fast immer einzigartigem FIM-Prompt (Prefix/Suffix
        # ändern sich ständig) — Cache-Trefferquote ~0, aber jede Anfrage würde
        # trotzdem einen Redis-Write auslösen. supported_call_types beschränkt
        # das Prompt-Caching auf Chat-Completions (llama-chat/llama-coder);
        # atext_completion (= /v1/completions, das llama-fim nutzt) bleibt
        # dadurch komplett vom Cache ausgenommen.
        supported_call_types: ["acompletion"]
general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY
    database_url: os.environ/DATABASE_URL
    proxy_batch_write_at: 1
