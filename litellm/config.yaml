model_list:
  - model_name: Qwen3.6-35B-A3B
    litellm_params:
      model: openai/Qwen3.6-35B-A3B
      api_base: http://llama-qwen35:8001/v1
      api_key: "not-needed"
      input_cost_per_token: 0.00000002
      output_cost_per_token: 0.00000002

  - model_name: Qwen3-Coder-Next
    litellm_params:
      model: openai/Qwen3-Coder-Next
      api_base: http://llama-coder:8002/v1
      api_key: "not-needed"
      input_cost_per_token: 0.00000002
      output_cost_per_token: 0.00000002

litellm_settings:
  callbacks: ["prometheus"]
  # Prometheus scrapes /metrics directly (operational metrics only, no
  # secrets); the LAN-facing exposure is already covered by ADR 0001.
  require_auth_for_metrics_endpoint: false
  # Clients (e.g. pi.dev) send OpenAI params like `reasoning_effort` that
  # llama.cpp's OpenAI-compatible server doesn't support; drop them instead
  # of erroring.
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Default batch interval is much longer; at this scale (single user/few
  # friends) frequent small writes are cheap and give near-real-time spend data.
  proxy_batch_write_at: 1
